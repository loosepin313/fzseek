# fzseek configuration file
# This file contains configuration options for the fzseek fuzzy finder application

general:
  # Default search mode (fuzzy, exact, regex)
  search_mode: "fuzzy"
  
  # Maximum number of results to display
  max_results: 100
  
  # Whether to show hidden files in searches
  show_hidden: false

ui:
  # Theme settings
  theme: "default"
  
  # Whether to enable color output
  color_enabled: true
  
  # Whether to enable animations
  animations_enabled: false

